common:
  lid_topic: "/os_cloud_node/points"
  imu_topic: "/alphasense_driver_ros/imu"
  img_en: 1
  lidar_en: 1
  ros_driver_bug_fix: false

#  Rcl represents the rotation matrix of LiDAR frame w.r.t. Camera frame.

#  Pcl represents the translation of LiDAR frame w.r.t. Camera frame.
#  extrinsic_R represents the rotation matrix of LiDAR frame w.r.t. IMU frame.
#  extrinsic_T represents the translation of LiDAR frame w.r.t. IMU frame.

extrin_calib:
  extrinsic_T: [-0.037, -0.008, -0.026]
  extrinsic_R: [1, 0, 0,
                0, -1, 0,
                0, 0, -1]


# 多相机外参统一放这里 ID必须与cam yaml对应 相机到雷达的变换
  cameras:
    - cam_id: 0
      img_topic: "/alphasense_driver_ros/cam0"
      Rcl: [ 0.00344, -0.99998, 0.00602,
             -0.00101, -0.00602, -0.99998,
             0.99999, 0.00343, -0.00103 ]
      Pcl: [ -0.05543, -0.01685, -0.08605 ]


