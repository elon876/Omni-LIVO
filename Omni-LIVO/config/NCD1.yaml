time_offset:
  imu_time_offset: 0.0
  img_time_offset: 0.0
  exposure_time_init: 0.0

preprocess:
  point_filter_num: 1
  filter_size_surf: 0.5
  lidar_type: 3
  scan_line: 128
  blind: 0.2

vio:
  max_iterations: 5
  outlier_threshold: 100
  img_point_cov: 1000
  patch_size: 4
  patch_pyrimid_level: 4
  normal_en: true
  raycast_en: false
  inverse_composition_en: false
  exposure_estimate_en: true
  inv_expo_cov: 0.1
  enable_cross_camera_tracking: true   # 是否启用跨相机追踪（多相机系统）
  enable_dynamic_covariance: false
  dynamic_cov_warmup_frames: 100      # 前200帧使用固定协方差
  warmup_cov_scale: 1000.0             # 预热期固定值（推荐300-800）
  max_cov_scale: 2000.0  #cupa 1000-2000
  min_cov_scale: 1000.0
  max_total_points: 300               # 所有相机总共最多保留的点数

  # 外参在线校准参数
  enable_extrinsic_calib: true         # 是否启用外参在线校准
  extrinsic_calib_rate: 0.05            # 外参更新步长 (0.01-0.1，越小越保守)
  extrinsic_regularization: 50.0        # 正则化权重（防止外参漂移，建议10-100）
  extrinsic_calib_translation_only: false # 仅校准平移（若旋转外参较准确）



imu:
  imu_en: true
  imu_int_frame: 30
  acc_cov: 0.5
  gyr_cov: 0.01
  b_acc_cov: 0.0001
  b_gyr_cov: 0.0001

lio:
  max_iterations: 5
  dept_err: 0.02
  beam_err: 0.05
  min_eigen_value: 0.0025 #0.0025
  voxel_size: 0.5
  max_layer: 4
  max_points_num: 300
  layer_init_num: [5, 5, 5, 5, 5]


local_map:
  map_sliding_en: false
  half_map_size: 100
  sliding_thresh: 8

uav:
  imu_rate_odom: false
  gravity_align_en: false

publish:
  dense_map_en: true
  pub_effect_point_en: false
  pub_plane_en: false
  pub_scan_num: 1
  blind_rgb_points: 0.0

evo:
  seq_name: "frame_pose"
  pose_output_en: true

pcd_save:
  pcd_save_en: false
  colmap_output_en: false
  filter_size_pcd: 0.2
  interval: -1
